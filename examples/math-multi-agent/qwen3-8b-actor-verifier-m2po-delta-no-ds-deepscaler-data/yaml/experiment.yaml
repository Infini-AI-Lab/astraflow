# ============================================================================
# Experiment config -- AstraFlow service + Trainers (2-model math actor-and-verify)
# Experiment: math-multi-agent / qwen3-8b-actor-verifier-m2po-delta-no-ds-deepscaler-data
#
# Same as qwen3-8b-actor-verifier-m2po-delta-deepscaler-data but WITHOUT dynamic sampling:
# the buffer's filter_function is left as the default (KeepAllFilter), so
# zero-advantage prompts are NOT filtered out.
#
# Two-model math workflow:
#   - model0 (solver):   generates a solution for the math problem
#   - model1 (verifier): approves or rejects the solution (at most once)
#   - If rejected, solver retries once with verifier's full output as context
#
# Both models are Qwen3-8B; each has its own SGLang instance and FSDP trainer.
#
# GPU layout (default, 8 GPUs):
#   SERVICE_CUDA_VISIBLE_DEVICES=0,1,2,3 -> RaaS (model0 dp=2, model1 dp=2)
#   TRAINER_MODEL0_GPUS=4,5              -> Trainer model0 (FSDP, 2 GPUs)
#   TRAINER_MODEL1_GPUS=6,7              -> Trainer model1 (FSDP, 2 GPUs)
# ============================================================================

# -- Experiment: identity, model, shared settings --
experiment:
  experiment_name: astraflow-math-multi-agent
  trial_name: qwen3-8b-actor-verifier-m2po-delta-no-ds-deepscaler-data
  fileroot: ./data-experiments/${experiment.experiment_name}/${experiment.trial_name}

  model_path: "Qwen/Qwen3-8B"
  tokenizer_path: "Qwen/Qwen3-8B"
  seed: 1
  dtype: bfloat16
  weight_transfer_mode: tcp
  weight_transfer_strategies: delta

# -- RaaS: what to generate (inference-level config) --
# model keys here also determine expected_model_ids for AstraFlow service
raas:
  models:
    model0:
      backend: sglang
      gconfig:
        n_samples: 8
        temperature: 1.0
        max_new_tokens: 4096
        min_new_tokens: 0
    model1:
      backend: sglang
      gconfig:
        n_samples: 8
        temperature: 1.0
        max_new_tokens: 4096
        min_new_tokens: 0
  delta_full_sync_interval: 10

# -- AstraFlow: data pipeline --
# auto-derives: expected_model_ids from raas.models keys
# auto-derives: dump_dir from experiment.fileroot
dataflow:
  host: "0.0.0.0"
  port: 8000
  dump_dir: ./data-experiments/${experiment.experiment_name}/${experiment.trial_name}/rollout_dumps

  buffer:
    size: 10000
    replay_size: 10000
    replay_ratio: 0
    max_staleness: 8
    # No filter_function set -> defaults to KeepAllFilter (no dynamic sampling).

  rollout_dataset:
    dataset_fn: "astraflow.dataflow.dataset.deepscaler:get_deepscaler_rl_dataset"
    max_length: 2000
    batch_size: 1

  workflow_spec:
    workflow_cls: "actor_and_verify"
    reward_fn: "math_verify"
    enable_thinking: false

  eval_workflows:
    math_eval:
      workflow_cls: "actor_and_verify"
      reward_fn: "math_verify"
      enable_thinking: false
      gconfig_overrides:
        temperature: 0.6
        n_samples: 1

  eval_datasets:
    aime24:
      dataset_fn: "astraflow.dataflow.dataset.aime24x4:get_aime_2024x4_test_dataset"
      max_length: 2000
      repeat: 4
      eval_workflow: math_eval
    aime25:
      dataset_fn: "astraflow.dataflow.dataset.aime25x4:get_aime_2025x4_test_dataset"
      max_length: 2000
      repeat: 4
      eval_workflow: math_eval
    amc:
      dataset_fn: "astraflow.dataflow.dataset.amc24:get_amc_2024x4_test_dataset"
      max_length: 2000
      repeat: 4
      eval_workflow: math_eval
    minerva:
      dataset_fn: "astraflow.dataflow.dataset.minervamath:get_minerva_math_test_dataset"
      max_length: 2000
      repeat: 4
      eval_workflow: math_eval
    math500:
      dataset_fn: "astraflow.dataflow.dataset.math500:get_math500_test_dataset"
      max_length: 2000
      repeat: 4
      eval_workflow: math_eval

# -- Trainer base: shared across model0 and model1 --
# auto-derives from experiment: experiment_name, trial_name, fileroot,
#   tokenizer_path, seed, dtype, weight_transfer_mode
# auto-derives from raas.models.<model_id>: actor.path, actor.max_new_tokens,
#   ref.path
# auto-derives: saver, recover, stats_logger fields from experiment section
# auto-derives: cluster.name_resolve from experiment.fileroot
# auto-derives: trial_name suffix from model_id (e.g. trial_name-model0)
trainer_base:
  total_train_steps: 1200
  train_batch_size: 256
  n_samples: 8
  engine:
    backend: fsdp
    data_parallel_size: 2

  actor:
    gradient_checkpointing: true
    mb_spec:
      max_tokens_per_mb: 17408
    optimizer:
      type: adam
      lr: 5e-6
      weight_decay: 0.01
      beta1: 0.9
      beta2: 0.999
      eps: 1e-8
      lr_scheduler_type: constant
      gradient_clipping: 1.0
      warmup_steps_proportion: 0.00
    # PPO / M2PO algorithm
    m2_threshold: 0.01
    eps_clip: 100.0
    eps_clip_higher: 100.0
    reward_scaling: 1
    reward_bias: 0
    kl_ctl: 0.00
    kl_penalty_coef: 0.001
    ppo_n_minibatches: 4
    recompute_logprob: false
    reward_norm: { mean_level: group, std_level: group }
    adv_norm: { mean_level: batch, std_level: batch }

  ref:
    mb_spec:
      max_tokens_per_mb: 17408

  recover:
    mode: auto
    freq_steps: 26

  evaluator:
    eval_at_start: false
    freq_steps: 25

  stats_logger:
    wandb:
      mode: online
      id_suffix: "uid"

# -- Trainer for model0 (solver) -- only overrides --
trainer_model0:
  model_id: model0
  stats_logger:
    wandb:
      tags: ["m2po", "math", "astraflow-v2", "qwen3-8b", "tcp", "delta", "ctx16k", "mnt4k", "2agent", "solver", "examples", "sglang-d2", "fsdp-d2", "no-filter"]

# -- Trainer for model1 (verifier) -- only overrides --
trainer_model1:
  model_id: model1
  stats_logger:
    wandb:
      tags: ["m2po", "math", "astraflow-v2", "qwen3-8b", "tcp", "delta", "ctx16k", "mnt4k", "2agent", "verifier", "examples", "sglang-d2", "fsdp-d2", "no-filter"]
