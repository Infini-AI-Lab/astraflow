# ============================================================================
# RaaS config — Inference serving instance (hardware/resources)
# Experiment: math / qwen3-1.7b-m2po-lora
#
# Hardware: 4x GPU, TP=1
#   model0:  DP=4, TP=1
#
# Merged with experiment.yaml at launch (--config experiment.yaml --config raas.yaml)
# experiment.yaml provides: model_path, tokenizer_path, seed, dtype, models/gconfig
#
# LoRA notes:
#   - enable_lora + max_lora_rank (>= actor.lora_rank) + lora_target_modules
#     must be set at launch so SGLang pre-sizes its adapter memory pool.
#   - lora_target_modules uses HF leaf names; SGLang normalizes q/k/v -> qkv_proj
#     and gate/up -> gate_up_proj internally, matching the receiver's adapter.
#   - attention_backend=triton + lora_backend=triton are required (the LoRA
#     kernels assume the triton path).
# ============================================================================

rollout:
  max_concurrent_rollouts: 1024
  # Cap concurrent eval prefills to bound peak KV pressure during the
  # ~3.5k-item eval burst (5 datasets x repeat=4) — default 128 OOMs sglang.
  max_concurrent_evals: 64
  pause_grace_period: 3
  # Adaptive availability — drive /availability off sglang /get_load.
  enable_adaptive_availability: true
  target_waiting_queue_per_dp: 4
  adaptive_step_size: 4
  load_cache_ttl_ms: 100

engine:
  model0:
    backend: sglang
    data_parallel_size: 4
    # Mirror the actor's LoRA setting (drives the inference engine's LoRA mode).
    use_lora: true

sglang:
  context_length: 16384
  mem_fraction_static: 0.8
  max_running_requests: null
  skip_tokenizer_init: true
  attention_backend: triton
  # ── LoRA ──
  enable_lora: true
  max_lora_rank: 32
  lora_target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
  # CRITICAL (root-caused 2026-06-20, per-rid instrumentation): the weight-sync
  # loads each new adapter under a fresh name (lora_v{N}). Under high rollout
  # concurrency a SMALL subset of in-flight requests get STUCK inside SGLang's
  # running batch — they never emit a finish output, so their LoRA usage counter
  # (lora_registry, acquired at submit) is NEVER released. This is a SGLang-
  # internal phantom-counter leak: the requests produce no scheduler output, no
  # disconnect, no abort, and even /abort_request(abort_all) cannot clear them.
  # When the registry overflows max_loaded_loras, SGLang LRU-evicts the OLDEST
  # version (lora_v1) and calls wait_for_unload(lora_v1); because lora_v1 still
  # carries phantom counters, wait_for_unload waits forever -> the inference
  # engine deadlocks (detok hang, GPUs idle, training stalls at step = cap+1).
  # AReaL never hits this: it keeps a bounded version window and only unloads
  # versions old enough to be guaranteed drained; it never asks SGLang to evict
  # a version that may still carry references. astraflow relied on SGLang's blind
  # auto-eviction, which evicts the phantom-carrying lora_v1.
  # The leak itself is inside SGLang (not fixable from astraflow). The fix is to
  # NEVER trigger an unload: set max_loaded_loras > total_train_steps so the
  # registry never overflows and wait_for_unload is never called. The phantom
  # counters then sit harmlessly in host memory (~tiny). Verified: full
  # max_concurrent_rollouts=1024, crossed all syncs to step 14, no wedge.
  # Cost: registry keeps every loaded adapter (~adapter_size x steps host mem).
  # max_loras_per_batch>4 also reduces how many requests get stuck (GPU-slot
  # starvation is one contributor). Memory-bound alternative: lower
  # rollout.max_concurrent_rollouts (~16-32) — fewer stuck requests — at a
  # throughput cost.
  max_loaded_loras: 8
  max_loras_per_batch: 8
  lora_drain_wait_threshold: 0.0
  lora_backend: triton
