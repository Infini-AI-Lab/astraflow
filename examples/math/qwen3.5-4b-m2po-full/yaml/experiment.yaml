# ============================================================================
# Experiment config — AstraFlow service + Trainer
# Experiment: math / qwen3.5-4b-m2po-full
#
# Qwen3.5-4B math RL with M2PO, ctx 8k, lr 5e-6, full TCP weight transfer.
#
# NOTE: Qwen3.5-4B is a HYBRID (Gated-DeltaNet + attention) multimodal model
#   (architecture Qwen3_5ForConditionalGeneration, model_type qwen3_5), trained
#   here TEXT-ONLY for math RL. Requires transformers>=5.8 (+ `fla` kernels for
#   training) and SGLang main (qwen3_5 + TritonGDNKernel) for inference.
#   attn_impl=sdpa (prebuilt flash-attn is not ABI-compatible with this torch).
#
# GPU layout (default, 8 GPUs):
#   SERVICE_CUDA_VISIBLE_DEVICES=0,1,2,3 -> RaaS (model0 dp=4)
#   TRAINER_MODEL0_GPUS=4,5,6,7          -> Trainer model0 (FSDP, 4 GPUs)
# ============================================================================

experiment:
  experiment_name: astraflow-math
  trial_name: qwen3.5-4b-m2po-full
  fileroot: ./data-experiments/${experiment.experiment_name}/${experiment.trial_name}

  model_path: "Qwen/Qwen3.5-4B"
  tokenizer_path: "Qwen/Qwen3.5-4B"
  seed: 1
  dtype: bfloat16
  weight_transfer_mode: tcp
  weight_transfer_strategies: full

raas:
  models:
    model0:
      backend: sglang
      gconfig:
        n_samples: 8
        temperature: 1.0
        max_new_tokens: 4000
        min_new_tokens: 0

dataflow:
  host: "0.0.0.0"
  port: 8000

  buffer:
    size: 10000
    replay_size: 10000
    replay_ratio: 0
    max_staleness: 8
    filter_function: filter_zero_adv

  rollout_dataset:
    dataset_fn: "astraflow.dataflow.dataset.deepscaler:get_deepscaler_rl_dataset"
    max_length: 2000

  workflow_spec:
    workflow_cls: "rlvr"
    reward_fn: "math_verify"
    enable_thinking: false

  eval_workflows:
    math_eval:
      workflow_cls: "rlvr"
      reward_fn: "math_verify"
      enable_thinking: false
      gconfig_overrides:
        temperature: 0.6
        n_samples: 1

  eval_datasets:
    aime24:
      dataset_fn: "astraflow.dataflow.dataset.aime24x4:get_aime_2024x4_test_dataset"
      max_length: 2000
      repeat: 4
      eval_workflow: math_eval
    aime25:
      dataset_fn: "astraflow.dataflow.dataset.aime25x4:get_aime_2025x4_test_dataset"
      max_length: 2000
      repeat: 4
      eval_workflow: math_eval
    amc:
      dataset_fn: "astraflow.dataflow.dataset.amc24:get_amc_2024x4_test_dataset"
      max_length: 2000
      repeat: 4
      eval_workflow: math_eval
    minerva:
      dataset_fn: "astraflow.dataflow.dataset.minervamath:get_minerva_math_test_dataset"
      max_length: 2000
      repeat: 4
      eval_workflow: math_eval
    math500:
      dataset_fn: "astraflow.dataflow.dataset.math500:get_math500_test_dataset"
      max_length: 2000
      repeat: 4
      eval_workflow: math_eval

trainer_base:
  total_train_steps: 800
  train_batch_size: 256
  n_samples: 8
  engine:
    backend: fsdp
    data_parallel_size: 4

  actor:
    # sdpa: prebuilt flash-attn isn't ABI-compatible with this torch/cu130 build;
    # Qwen3.5's GDN linear-attn uses fla kernels and full-attn blocks use sdpa.
    attn_impl: sdpa
    gradient_checkpointing: true
    mb_spec:
      max_tokens_per_mb: 8192
    optimizer:
      type: adam
      lr: 5e-6
      weight_decay: 0.01
      beta1: 0.9
      beta2: 0.999
      eps: 1e-8
      lr_scheduler_type: constant
      gradient_clipping: 1.0
    m2_threshold: 0.01
    eps_clip: 100.0
    eps_clip_higher: 100.0
    reward_scaling: 1
    reward_bias: 0
    kl_ctl: 0.00
    kl_penalty_coef: 0.001
    ppo_n_minibatches: 4
    reward_norm: { mean_level: group, std_level: group }
    adv_norm: { mean_level: batch, std_level: batch }

  ref:
    attn_impl: sdpa
    mb_spec:
      max_tokens_per_mb: 8192

  recover:
    mode: auto
    freq_steps: 25

  evaluator:
    eval_at_start: false
    freq_steps: 25

  stats_logger:
    wandb:
      mode: online
      id_suffix: "uid"

trainer_model0:
  model_id: model0
  stats_logger:
    wandb:
      tags: ["m2po", "math", "astraflow-v2", "qwen3.5-4b", "tcp", "ctx8k", "hybrid-gdn"]
