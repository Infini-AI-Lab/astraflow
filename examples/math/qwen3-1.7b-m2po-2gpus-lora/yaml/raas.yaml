# ============================================================================
# RaaS config -- Inference serving instance (hardware/resources)
# Experiment: math / qwen3-1.7b-m2po-2gpus-lora
#
# Hardware: 1x GPU, TP=1
#   model0: DP=1, TP=1
#
# Merged with experiment.yaml at launch (--config experiment.yaml --config raas.yaml)
# experiment.yaml provides: model_path, tokenizer_path, seed, dtype, models/gconfig
#
# LoRA notes:
#   - enable_lora + max_lora_rank (>= actor.lora_rank) + lora_target_modules
#     must be set at launch so SGLang pre-sizes its adapter memory pool.
#   - lora_target_modules uses HF leaf names; SGLang normalizes q/k/v -> qkv_proj
#     and gate/up -> gate_up_proj internally, matching the receiver's adapter.
#   - lora_backend=triton is required (the LoRA kernels assume the triton path).
#   - Versioned pause-and-swap: each step loads a fresh adapter name; the registry
#     (max_loaded_loras) and GPU pool (max_loras_per_batch) LRU-evict old versions.
# ============================================================================

rollout:
  max_concurrent_rollouts: 256
  pause_grace_period: 3
  # Adaptive availability -- drive /availability off sglang /get_load.
  enable_adaptive_availability: true
  target_waiting_queue_per_dp: 4
  adaptive_step_size: 4
  load_cache_ttl_ms: 100

engine:
  model0:
    backend: sglang
    data_parallel_size: 1
    # Mirror the actor's LoRA setting (drives the inference engine's LoRA mode).
    use_lora: true

sglang:
  context_length: 7168
  mem_fraction_static: 0.8
  max_running_requests: 48
  skip_tokenizer_init: true
  attention_backend: triton
  # -- LoRA --
  enable_lora: true
  max_lora_rank: 32
  lora_target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
  # Versioned adapters accumulate in the registry; we don't explicitly unload.
  # max_loaded_loras caps the registry (LRU-evicts old versions once full);
  # max_loras_per_batch caps GPU-resident adapters (mem-pool LRU evicts the rest)
  # and lets a couple versions coexist at weight-sync boundaries. The registry-LRU
  # eviction internally calls SGLang's wait_for_unload, which is now safe:
  # LoRACounterLeakPatch (astraflow/raas/patch/sglang.py) fixes the abort-time
  # usage-counter leak that used to hang it once this cap was reached.
  max_loaded_loras: 256
  max_loras_per_batch: 4
  lora_backend: triton
