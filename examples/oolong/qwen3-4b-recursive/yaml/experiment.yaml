# ============================================================================
# Experiment config — AstraFlow service + Trainer (OOLONG RECURSIVE AGENT)
# Experiment: oolong / qwen3-4b-recursive
#
# Port of platoon's OOLONG-REAL design (see arxiv 2605.06639, "Recursive
# Agent Optimization", Gandhi et al.):
#   - workflow_cls: oolong_recursive
#   - Python-sandbox env (exec() namespace per agent), context pre-loaded
#     into the sandbox not the prompt
#   - <thought>...</thought><python>...</python> action format
#   - launch_subagent(goal, context) for spawn; asyncio.gather for parallel
#   - Reward = success + lambda * mean(children's success), lambda=0.4
#   - Synth-only rule-based grader for v1 (oolong-real LLM judge is TODO)
#
# Model: Qwen3-4B-Instruct-2507 (same as TextCraft recipe; paper used 30B
# but we use 4B for parity with our infra).
#
# GPU layout (8 GPUs):
#   SERVICE_CUDA_VISIBLE_DEVICES=0,1,2,3 -> RaaS (model0 dp=4)
#   TRAINER_MODEL0_GPUS=4,5,6,7          -> Trainer (FSDP, 4 GPUs)
# ============================================================================

experiment:
  experiment_name: astraflow-oolong
  trial_name: qwen3-4b-oolong-recursive
  fileroot: ./data-experiments/${experiment.experiment_name}/${experiment.trial_name}

  model_path: "Qwen/Qwen3-4B-Instruct-2507"
  tokenizer_path: "Qwen/Qwen3-4B-Instruct-2507"
  seed: 1
  dtype: bfloat16
  weight_transfer_mode: tcp
  weight_transfer_strategies: full

raas:
  models:
    model0:
      backend: sglang
      gconfig:
        n_samples: 8
        temperature: 1.0
        max_new_tokens: 2048   # per-turn budget; recursive Oolong likes longer thinking
        min_new_tokens: 0

dataflow:
  host: "0.0.0.0"
  port: 8000

  dump_dir: "./data-experiments/${experiment.experiment_name}/${experiment.trial_name}/rollout_dumps"

  buffer:
    size: 10000
    replay_size: 10000
    replay_ratio: 0
    max_staleness: 8
    filter_function: filter_zero_adv

  rollout_dataset:
    dataset_fn: "astraflow.dataflow.dataset.oolong:get_oolong_rl_dataset"
    # Start small: short-context validation tasks only. Once it learns to
    # delegate, raise max_context_len and switch to test split.
    dataset: synth
    split: validation
    max_context_len: 8000           # ~2K tokens; safe for 32K ctx + recursion
    num_tasks: 200                  # subset for fast iteration

  workflow_spec:
    workflow_cls: "oolong_recursive"
    reward_fn: "oolong_success"
    max_depth: 2                    # paper: 2 (0-indexed; 3 levels incl. root)
    max_breadth: 4                  # safety cap
    max_steps_per_episode: 25       # root step cap
    sub_max_steps: 15               # sub step cap (paper used 15 for sub)
    max_concurrent_subagents: 8
    # With team-credit (workflow assigns root_reward to all agents),
    # delegation_lambda is redundant: root_reward = root_success + λ·mean(0) = root_success
    # since sub-agents have no node-local verifier without an LLM judge.
    # Set to 0 to keep semantics explicit. Re-enable when LLM judge lands.
    delegation_lambda: 0.0
    stdout_truncate: 8000
    enable_thinking: false
    # v1 dump rate. Bump to inspect agent behavior.
    dump_prob: 0.02

  eval_workflows:
    oolong_eval:
      workflow_cls: "oolong_recursive"
      reward_fn: "oolong_success"
      max_depth: 2
      max_breadth: 4
      max_steps_per_episode: 25
      sub_max_steps: 15
      delegation_lambda: 0.0        # eval: only root reward counts
      stdout_truncate: 8000
      enable_thinking: false
      dump_prob: 0.05
      gconfig_overrides:
        n_samples: 1
        temperature: 0.6

  eval_datasets:
    oolong_val:
      dataset_fn: "astraflow.dataflow.dataset.oolong:get_oolong_eval_dataset"
      dataset: synth
      split: test
      max_context_len: 8000
      num_val: 50
      repeat: 1
      eval_workflow: oolong_eval

trainer_base:
  total_train_steps: 200
  # v2 with bs=64 collapsed (pre_filter 0.80→0.30 in 19 steps). With
  # team-credit + recursive trees, each rollout produces ~15-30 sequences,
  # so bs=64 covers only ~2-4 unique prompts/step — too few unique groups
  # to survive filter_zero_adv. v20 (TextCraft) used bs=512 successfully;
  # using bs=256 here as a balance.
  train_batch_size: 256
  n_samples: 8
  engine:
    backend: fsdp
    data_parallel_size: 4

  actor:
    gradient_checkpointing: true
    mb_spec:
      max_tokens_per_mb: 32768
    optimizer:
      type: adam
      lr: 1e-6                       # v2-v4 at 3e-6 degraded fast; Oolong has low headroom (~30%) and noisy reward, needs smaller updates
      weight_decay: 0.0
      beta1: 0.9
      beta2: 0.95
      eps: 1e-8
      lr_scheduler_type: constant
      gradient_clipping: 1.0
    # M2PO (same as TextCraft)
    m2_threshold: 0.01
    eps_clip: 100.0
    eps_clip_higher: 100.0
    reward_scaling: 1
    reward_bias: 0
    kl_ctl: 0.00
    kl_penalty_coef: 0.001
    ppo_n_minibatches: 4             # bs=256 / 4 = 64 per minibatch (matches v20 ratio)
    reward_norm: { mean_level: group, std_level: group }
    adv_norm: { mean_level: batch, std_level: batch }

  ref:
    path: "Qwen/Qwen3-4B-Instruct-2507"
    mb_spec:
      max_tokens_per_mb: 32768

  recover:
    mode: auto
    freq_steps: 25

  evaluator:
    eval_at_start: false              # skip v0 eval per [[eval-at-start-default-false]]
    freq_steps: 20

  stats_logger:
    wandb:
      mode: online
      id_suffix: "uid"

trainer_model0:
  model_id: model0
  stats_logger:
    wandb:
      tags: ["oolong", "oolong-synth", "recursive-agent", "qwen3-4b", "m2po", "platoon-port"]
