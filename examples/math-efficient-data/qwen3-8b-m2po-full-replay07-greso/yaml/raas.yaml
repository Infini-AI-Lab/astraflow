# ============================================================================
# RaaS config — Inference serving instance (hardware/resources)
# Experiment: math-efficient-data / qwen3-8b-m2po-full-replay07-greso
#
# Hardware: 4x GPU, TP=1
#   model0:  DP=4, TP=1
#
# Merged with experiment.yaml at launch (--config experiment.yaml --config raas.yaml)
# experiment.yaml provides: model_path, tokenizer_path, seed, dtype, models/gconfig
# ============================================================================

rollout:
  max_concurrent_rollouts: 256
  pause_grace_period: 3
  # Adaptive availability — drive /availability off sglang /get_load.
  enable_adaptive_availability: true
  target_waiting_queue_per_dp: 4
  adaptive_step_size: 4
  load_cache_ttl_ms: 100

engine:
  model0:
    backend: sglang
    data_parallel_size: 4

sglang:
  context_length: 16384
  mem_fraction_static: 0.6
  max_running_requests: 64
  skip_tokenizer_init: true
  max_prefill_tokens: 4096
