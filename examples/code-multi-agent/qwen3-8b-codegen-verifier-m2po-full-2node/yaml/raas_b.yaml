# ============================================================================
# RaaS-B — secondary inference replica on compute-node-0 (GPUs 0..3)
# Hosts BOTH models on 4 GPUs (the other 4 on compute-node-0 are trainers):
#   model0 (codegen): DP=3, TP=1
#   model1 (testgen): DP=1, TP=1
# ============================================================================

rollout:
  max_concurrent_rollouts: 256
  pause_grace_period: 3
  enable_adaptive_availability: true
  target_waiting_queue_per_dp: 4
  adaptive_step_size: 4
  load_cache_ttl_ms: 100

engine:
  model0:
    backend: sglang
    data_parallel_size: 3
  model1:
    backend: sglang
    data_parallel_size: 1

sglang:
  context_length: 12288
  mem_fraction_static: 0.8
  max_running_requests: 48
  skip_tokenizer_init: true
