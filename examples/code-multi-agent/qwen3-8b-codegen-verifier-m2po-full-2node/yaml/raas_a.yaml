# ============================================================================
# RaaS-A — primary inference replica on compute-node-1 (8 GPUs)
# Hosts BOTH models on the 8 GPUs of compute-node-1:
#   model0 (codegen): DP=6, TP=1
#   model1 (testgen): DP=2, TP=1
# ============================================================================

rollout:
  max_concurrent_rollouts: 256
  pause_grace_period: 3
  enable_adaptive_availability: true
  target_waiting_queue_per_dp: 4
  adaptive_step_size: 4
  load_cache_ttl_ms: 100

engine:
  model0:
    backend: sglang
    data_parallel_size: 6
  model1:
    backend: sglang
    data_parallel_size: 2

sglang:
  context_length: 12288
  mem_fraction_static: 0.8
  max_running_requests: 48
  skip_tokenizer_init: true
