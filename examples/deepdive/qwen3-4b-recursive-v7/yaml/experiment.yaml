# ============================================================================
# Experiment config — AstraFlow service + Trainer (DEEPDIVE RECURSIVE AGENT)
# Experiment: deepdive / qwen3-4b-recursive
#
# Port of platoon's DeepDive RL recipe (see configs/areal/deepdive_areal.yaml):
#   - workflow_cls: deepdive_recursive
#   - Python-sandbox env (exec() namespace per agent), NO pre-loaded context
#   - Tools: search_web(query, n_docs) via CMU RAG, launch_subagent(goal),
#            finish(answer), asyncio
#   - <thought>...</thought><python>...</python> action format
#   - Reward: LLM judge for root (vs ground_truth) AND for sub-agents (vs goal)
#     -- DeepDive has no rule-based grader, judge is always required
#   - delegation_lambda = 0.0 (matches platoon's _DEEPDIVE_DELEGATION_REWARD_CAP)
#
# Model: Qwen3-4B-Instruct-2507 (same as Oolong/TextCraft; platoon uses same)
#
# GPU layout (8 GPUs):
#   SERVICE_CUDA_VISIBLE_DEVICES=0,1,2,3 -> RaaS (model0 dp=4)
#   TRAINER_MODEL0_GPUS=4,5,6,7          -> Trainer (FSDP, 4 GPUs)
#
# External services required at launch:
#   - FIREWORKS_API_KEY for astraEnv.judge (~/.fireworks_key)
#   - CMU_SEARCH_API_KEY for astraEnv.search (~/.cmu_search_key)
# ============================================================================

experiment:
  experiment_name: astraflow-deepdive
  trial_name: qwen3-4b-deepdive-recursive-v7
  fileroot: ./data-experiments/${experiment.experiment_name}/${experiment.trial_name}

  model_path: "Qwen/Qwen3-4B-Instruct-2507"
  tokenizer_path: "Qwen/Qwen3-4B-Instruct-2507"
  seed: 1
  dtype: bfloat16
  weight_transfer_mode: tcp
  weight_transfer_strategies: full

raas:
  models:
    model0:
      backend: sglang
      gconfig:
        n_samples: 8
        temperature: 1.0
        max_new_tokens: 8192   # platoon default for DeepDive — research needs long replies
        min_new_tokens: 0

dataflow:
  host: "0.0.0.0"
  port: 8000

  dump_dir: "./data-experiments/${experiment.experiment_name}/${experiment.trial_name}/rollout_dumps"

  buffer:
    size: 10000
    replay_size: 10000
    replay_ratio: 0
    max_staleness: 8
    # filter_zero_adv: drop prompt groups where all 8 samples got identical
    # rewards (= zero group variance = zero gradient signal). Matches
    # platoon's filter_zero_variance_groups: True default. Required when
    # the root rubric is binary (success bool → 0/1) since many groups
    # naturally come out all-0 or all-1 for a base model on a hard task.
    filter_function: filter_zero_adv

  rollout_dataset:
    dataset_fn: "astraflow.dataflow.dataset.deepdive:get_deepdive_rl_dataset"
    split: qa_rl                    # platoon: train_split
    num_tasks: null                 # platoon: train_num_tasks=null (use all)

  workflow_spec:
    workflow_cls: "deepdive_recursive"
    reward_fn: "deepdive_success"
    # Reward mode — selects which credit-assignment scheme to use:
    #   team_credit:     all agents train on root's LLM-judged reward (cheap).
    #   per_agent_judge: each agent trains on its own LLM-judged reward
    #                    (more judge calls; closer to "true" per-agent credit).
    # Default matches platoon's behavior (delegation_cap=0 → effectively
    # team_credit). Switch to per_agent_judge for the LLM-judge-everywhere
    # experiment if team_credit doesn't move accuracy.
    reward_mode: team_credit
    max_depth: 4                    # platoon: DepthAwareStepBudgetTracker(max_depth=4)
    max_steps_per_episode: 25       # platoon: max_steps=25
    sub_max_steps: 15
    max_concurrent_subagents: 4     # conservative; bump if RaaS queue stays low
    delegation_lambda: 0.0          # platoon: _DEEPDIVE_DELEGATION_REWARD_CAP=0.0
    stdout_truncate: 8000
    enable_thinking: false
    dump_prob: 0.25                 # ~64 dumps/step at bs=256 — denser sampling for debugging

  eval_workflows:
    deepdive_eval:
      workflow_cls: "deepdive_recursive"
      reward_fn: "deepdive_success"
      reward_mode: team_credit
      max_depth: 4
      max_steps_per_episode: 25
      sub_max_steps: 15
      delegation_lambda: 0.0
      stdout_truncate: 8000
      enable_thinking: false
      dump_prob: 0.25
      gconfig_overrides:
        n_samples: 1
        temperature: 0.6

  eval_datasets:
    deepdive_val:
      dataset_fn: "astraflow.dataflow.dataset.deepdive:get_deepdive_eval_dataset"
      split: qa_sft                 # platoon: eval_split
      num_val: 100                  # platoon: eval_num_tasks=100
      repeat: 1
      eval_workflow: deepdive_eval

trainer_base:
  total_train_steps: 500            # v4 action format stable; train at scale for 500 iters
  train_batch_size: 256             # bumped back from v2's diagnostic bs=64
  n_samples: 8
  engine:
    backend: fsdp
    data_parallel_size: 4

  actor:
    gradient_checkpointing: true
    mb_spec:
      max_tokens_per_mb: 40000      # match context_length=40001 (platoon uses 40000)
    optimizer:
      type: adam
      lr: 3e-6                      # platoon's lr
      weight_decay: 0.0
      beta1: 0.9
      beta2: 0.95
      eps: 1e-8
      lr_scheduler_type: constant
      gradient_clipping: 1.0
    # M2PO (we keep our loss; platoon uses CISPO)
    m2_threshold: 0.01
    eps_clip: 100.0
    eps_clip_higher: 100.0
    reward_scaling: 1
    reward_bias: 0
    kl_ctl: 0.00
    kl_penalty_coef: 0.001
    ppo_n_minibatches: 4
    reward_norm: { mean_level: group, std_level: group }
    adv_norm: { mean_level: batch, std_level: batch }

  ref:
    path: "Qwen/Qwen3-4B-Instruct-2507"
    mb_spec:
      max_tokens_per_mb: 40000

  recover:
    mode: auto
    freq_steps: 25

  evaluator:
    eval_at_start: false             # skip v0 eval per [[eval-at-start-default-false]]
    freq_steps: 20

  stats_logger:
    wandb:
      mode: online
      id_suffix: "uid"

trainer_model0:
  model_id: model0
  stats_logger:
    wandb:
      tags: ["deepdive", "recursive-agent", "qwen3-4b", "m2po", "llm-judge"]
